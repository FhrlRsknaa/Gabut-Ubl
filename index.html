<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun Xiaomi Gratis - UBL Ready</title>
    <!-- Font Awesome untuk icon (opsional jika logo tidak load) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset & Setup Layar Penuh */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            
            /* Background animasi gradient biru dan putih liquid */
            background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 25%, #bae6fd 50%, #7dd3fc 75%, #38bdf8 100%);
            background-size: 400% 400%;
            animation: liquidGradient 12s ease infinite;
        }

        @keyframes liquidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container Utama dengan efek Glassmorphism */
        .glass-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        /* Area Logo */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .logo-container img, .logo-container i.fa-lock-open {
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        
        .logo-container i.fa-lock-open {
            font-size: 50px;
            line-height: 60px;
            color: #ff6700; /* Warna orange Xiaomi */
        }

        .logo-container img:hover, .logo-container i.fa-lock-open:hover {
            transform: scale(1.1);
        }

        /* Garis pemisah antara logo */
        .logo-divider {
            width: 2px;
            height: 40px;
            background-color: rgba(255, 103, 0, 0.5); /* Warna orange Xiaomi */
        }

        /* Styling Judul */
        .title-text {
            color: #0f172a;
            font-size: 28px;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .title-highlight {
            color: #ff6700; /* Warna orange khas Xiaomi */
            text-shadow: 0 2px 10px rgba(255, 103, 0, 0.3);
        }

        .subtitle-text {
            color: #334155;
            font-size: 16px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* Efek Tema Liquid Glass Blur pada Tombol */
        .glass-btn {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: 700;
            color: #0284c7;
            cursor: pointer;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            outline: none;
            
            /* Inti dari Glassmorphism */
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 25px 0 rgba(2, 132, 199, 0.2);
            
            /* Transisi animasi saat disentuh */
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        /* Efek kilauan liquid di dalam tombol saat hover */
        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            transition: 0.6s;
        }

        /* Efek saat kursor berada di atas tombol */
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 15px 35px 0 rgba(2, 132, 199, 0.3);
            color: #0369a1;
            border-color: #fff;
        }

        .glass-btn:hover::before {
            left: 100%;
        }

        /* Efek saat tombol diklik */
        .glass-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px 0 rgba(2, 132, 199, 0.2);
        }

        .btn-icon {
            font-size: 26px;
        }

        /* Dekorasi background tambahan (gelembung blur) */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
            opacity: 0.6;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #ff6700; /* Orange Xiaomi */
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #0ea5e9; /* Biru muda */
            bottom: -150px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
            100% { transform: translate(0, 0); }
        }

    </style>
</head>
<body>

    <!-- Dekorasi Background -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Container Utama -->
    <div class="glass-container">
        
        <!-- Logo Area -->
        <div class="logo-container">
            <!-- Menggunakan logo SVG/PNG eksternal untuk Xiaomi dan Xiaomi Community -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="Logo Xiaomi" title="Xiaomi">
            <div class="logo-divider"></div>
            <!-- Menggunakan icon gembok terbuka dari FontAwesome untuk status UBL Ready -->
            <i class="fa-solid fa-lock-open" title="UBL Ready"></i>
        </div>

        <!-- Judul -->
        <h1 class="title-text">
            Dapatkan <span class="title-highlight">Akun Xiaomi</span> <br>
            Yang Sudah Di ACC Xiaomi Community Gratis
        </h1>
        <p class="subtitle-text">Siap untuk UBL (Unlock Bootloader). Klik tombol di bawah ini!</p>

        <!-- Tombol Utama -->
        <button class="glass-btn" id="tombolSuara">
            <i class="fa-solid fa-unlock-keyhole btn-icon"></i>
            Dapatkan Akun Xiaomi
        </button>
        
        <!-- Element Audio (Tersembunyi) -->
        <audio id="audioLokal" src="suara.mp3"></audio>

    </div>

    <script>
        // Mengambil elemen dari HTML
        const tombol = document.getElementById('tombolSuara');
        const audio = document.getElementById('audioLokal');

        // Menambahkan aksi ketika tombol diklik
        tombol.addEventListener('click', () => {
            // Reset waktu ke 0 agar suara bisa langsung berbunyi kembali jika diklik berkali-kali secara cepat
            audio.currentTime = 0; 
            
            // Memutar file audio
            audio.play().catch(error => {
                console.log("Gagal memutar suara. Pastikan file 'suara.mp3' ada di folder yang sama.");
            });

            // Mengarahkan ke link YouTube setelah jeda 0.5 detik
            setTimeout(() => {
                window.location.href = "https://youtu.be/dQw4w9WgXcQ?si=Kp6qqDu3E0-Sn5f2";
            }, 500);
        });
    </script>

</body>
</html>
