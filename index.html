<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun Xiaomi Gratis - UBL Ready</title>
    <!-- Font Awesome untuk icon (opsional jika logo tidak load) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset & Setup Layar Penuh */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            
            /* Background animasi gradient biru dan putih liquid */
            background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 25%, #bae6fd 50%, #7dd3fc 75%, #38bdf8 100%);
            background-size: 400% 400%;
            animation: liquidGradient 12s ease infinite;
        }

        @keyframes liquidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container Utama dengan efek Glassmorphism */
        .glass-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        /* Area Logo */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .logo-container img, .logo-container i.fa-lock-open {
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }
        
        .logo-container i.fa-lock-open {
            font-size: 50px;
            line-height: 60px;
            color: #ff6700; /* Warna orange Xiaomi */
        }

        .logo-container img:hover, .logo-container i.fa-lock-open:hover {
            transform: scale(1.1);
        }

        /* Garis pemisah antara logo */
        .logo-divider {
            width: 2px;
            height: 40px;
            background-color: rgba(255, 103, 0, 0.5); /* Warna orange Xiaomi */
        }

        /* Styling Judul */
        .title-text {
            color: #0f172a;
            font-size: 28px;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .title-highlight {
            color: #ff6700; /* Warna orange khas Xiaomi */
            text-shadow: 0 2px 10px rgba(255, 103, 0, 0.3);
        }

        .subtitle-text {
            color: #334155;
            font-size: 16px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* Efek Tema Liquid Glass Blur pada Tombol */
        .glass-btn {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: 700;
            color: #0284c7;
            cursor: pointer;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            outline: none;
            
            /* Inti dari Glassmorphism */
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 25px 0 rgba(2, 132, 199, 0.2);
            
            /* Transisi animasi saat disentuh */
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        /* Efek kilauan liquid di dalam tombol saat hover */
        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
            transition: 0.6s;
        }

        /* Efek saat kursor berada di atas tombol */
        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 15px 35px 0 rgba(2, 132, 199, 0.3);
            color: #0369a1;
            border-color: #fff;
        }

        .glass-btn:hover::before {
            left: 100%;
        }

        /* Efek saat tombol diklik */
        .glass-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px 0 rgba(2, 132, 199, 0.2);
        }

        .btn-icon {
            font-size: 26px;
        }

        /* Dekorasi background tambahan (gelembung blur) */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
            opacity: 0.6;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #ff6700; /* Orange Xiaomi */
            top: -100px;
            left: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #0ea5e9; /* Biru muda */
            bottom: -150px;
            right: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
            100% { transform: translate(0, 0); }
        }

        /* --- Styling Modal Video Popup --- */
        .modal-overlay {
            display: none; /* Disembunyikan secara default */
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .video-glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px;
            width: 90%;
            max-width: 800px;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .modal-overlay.show .video-glass-container {
            transform: scale(1);
        }

        .close-modal-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            background: #ff6700;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 101;
            transition: transform 0.2s, background 0.2s;
        }

        .close-modal-btn:hover {
            transform: scale(1.1);
            background: #e65c00;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Rasio 16:9 untuk video YouTube */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: #000;
        }

        /* Diperbarui agar mendukung tag video juga, tidak hanya iframe */
        .video-wrapper iframe,
        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        /* --- Responsive Design untuk Tampilan Mobile (HP) --- */
        @media (max-width: 600px) {
            .glass-container {
                padding: 30px 20px; /* Kurangi padding agar tidak terlalu sesak di layar kecil */
                border-radius: 20px;
            }

            .logo-container {
                gap: 15px;
                margin-bottom: 15px;
            }

            .logo-container img, .logo-container i.fa-lock-open {
                height: 45px; /* Perkecil ukuran logo */
            }
            
            .logo-container i.fa-lock-open {
                font-size: 40px;
                line-height: 45px;
            }

            .title-text {
                font-size: 22px; /* Perkecil ukuran font judul */
                margin-bottom: 10px;
            }

            .subtitle-text {
                font-size: 14px; /* Perkecil sub-judul */
                margin-bottom: 30px;
            }

            .glass-btn {
                padding: 15px 25px; /* Sesuaikan ukuran tombol */
                font-size: 16px;
                letter-spacing: 1px;
                width: 100%; /* Buat tombol agak memanjang penuhi layar */
                justify-content: center;
            }

            .btn-icon {
                font-size: 20px;
            }

            .video-glass-container {
                padding: 10px;
                width: 95%; /* Buat popup video lebih lebar di HP */
            }

            .close-modal-btn {
                width: 35px;
                height: 35px;
                font-size: 20px;
                top: -10px;
                right: -10px;
            }
        }

    </style>
</head>
<body>

    <!-- Dekorasi Background -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Container Utama -->
    <div class="glass-container">
        
        <!-- Logo Area -->
        <div class="logo-container">
            <!-- Menggunakan logo SVG/PNG eksternal untuk Xiaomi dan Xiaomi Community -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/ae/Xiaomi_logo_%282021-%29.svg" alt="Logo Xiaomi" title="Xiaomi">
            <div class="logo-divider"></div>
            <!-- Menggunakan icon gembok terbuka dari FontAwesome untuk status UBL Ready -->
            <i class="fa-solid fa-lock-open" title="UBL Ready"></i>
        </div>

        <!-- Judul -->
        <h1 class="title-text">
            Dapatkan <span class="title-highlight">Akun Xiaomi</span> <br>
            Yang Sudah Di ACC Xiaomi Community secara Gratis
        </h1>
        <p class="subtitle-text">Siap untuk UBL (Unlock Bootloader). Klik tombol di bawah ini!</p>

        <!-- Tombol Utama -->
        <button class="glass-btn" id="tombolSuara">
            <i class="fa-solid fa-unlock-keyhole btn-icon"></i>
            Dapatkan Akun Xiaomi
        </button>
        
        <!-- Element Audio (Tersembunyi) -->
        <audio id="audioLokal" src="suara.mp3"></audio>

    </div>

    <!-- Modal Video Popup -->
    <div id="videoModal" class="modal-overlay">
        <div class="video-glass-container">
            <span class="close-modal-btn" id="closeModal">&times;</span>
            <div class="video-wrapper">
                <!-- Tag video HTML5 untuk memutar video lokal -->
                <video id="localVideo" width="100%" height="100%" controls>
                    <source src="video-lokal.mp4" type="video/mp4">
                    Browser Anda tidak mendukung tag video HTML5.
                </video>
            </div>
        </div>
    </div>

    <script>
        // Mengambil elemen dari HTML
        const tombol = document.getElementById('tombolSuara');
        const audio = document.getElementById('audioLokal');
        
        // Elemen Modal dan Video
        const modal = document.getElementById('videoModal');
        const closeModal = document.getElementById('closeModal');
        const videoElement = document.getElementById('localVideo');

        // Menambahkan aksi ketika tombol diklik
        tombol.addEventListener('click', () => {
            // Reset waktu ke 0 agar suara bisa langsung berbunyi kembali
            audio.currentTime = 0; 
            
            // Memutar file audio
            audio.play().catch(error => {
                console.log("Gagal memutar suara.");
            });

            // Munculkan popup modal setelah jeda 0.5 detik
            setTimeout(() => {
                modal.style.display = 'flex';
                // Timeout kecil agar animasi transisi CSS berfungsi
                setTimeout(() => {
                    modal.classList.add('show');
                    // Memulai pemutaran video lokal
                    videoElement.currentTime = 0;
                    videoElement.play().catch(error => {
                        console.log("Gagal memutar video lokal. Pastikan file 'video-lokal.mp4' ada di folder yang sama.");
                    });
                }, 10);
            }, 500);
        });

        // Menambahkan aksi untuk tombol close (X)
        closeModal.addEventListener('click', () => {
            modal.classList.remove('show'); // Hapus class agar animasi menghilang jalan
            
            // Tunggu animasi menghilang selesai (400ms), baru benar-benar sembunyikan dan matikan video
            setTimeout(() => {
                modal.style.display = 'none';
                videoElement.pause(); // Hentikan video saat modal ditutup
            }, 400); 
        });
    </script>

</body>
</html>
